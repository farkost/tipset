<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Admin — spår</title>
  <script src="js/pasktipset-boot.js"></script>
  <script src="js/api-config.js"></script>
  <script src="js/api-base.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
  <style>body { font-family: Nunito, system-ui, sans-serif; }</style>
</head>
<body class="min-h-[100dvh] bg-gradient-to-b from-slate-100 to-slate-200 text-slate-900 antialiased">
  <div class="mx-auto max-w-lg px-4 py-8">
    <h1 class="text-2xl font-extrabold">Arrangörsvy (värd)</h1>
    <p class="mt-2 text-sm text-slate-600">Samma funktioner som <strong>Värdpanel</strong> i spelet — använd den här sidan om du är värd på en annan enhet och klistrar in nyckeln manuellt.</p>

    <div class="mt-6 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <label class="text-sm font-bold">Lobby-kod</label>
      <input id="code" class="mt-1 w-full rounded-xl border-2 border-slate-200 px-3 py-2 font-mono uppercase" />
      <label class="mt-4 block text-sm font-bold">Arrangörsnyckel (creator token)</label>
      <textarea id="token" rows="3" class="mt-1 w-full rounded-xl border-2 border-slate-200 px-3 py-2 font-mono text-xs" placeholder="Klistra in från när du skapade spåret"></textarea>
      <button type="button" id="btn-load" class="mt-4 w-full rounded-xl bg-slate-800 py-3 font-extrabold text-white">Ladda lista</button>
    </div>

    <p id="err" class="mt-4 hidden text-center font-bold text-red-600"></p>

    <div id="panel" class="mt-6 hidden rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <h2 class="font-extrabold">Spelare &amp; resultat</h2>
      <ul id="list" class="mt-3 max-h-64 overflow-auto text-sm"></ul>
      <button type="button" id="btn-clear-all" class="mt-6 w-full rounded-xl border-2 border-red-300 bg-red-50 py-3 font-extrabold text-red-800">Nollställ alla spelare (status + resultat)</button>
    </div>

    <p class="mt-8 flex flex-col items-center gap-3 text-center text-sm">
      <a id="link-admin-to-game" href="forest-treasure-hunt.html" class="hidden font-bold text-emerald-800 underline">Öppna spelet (samma lobby)</a>
      <a href="lobby.html" class="font-bold text-slate-700 underline">Tillbaka till lobby</a>
    </p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const presetCode = params.get('lobby');
    if (presetCode) document.getElementById('code').value = presetCode;
    const linkToGame = document.getElementById('link-admin-to-game');
    if (presetCode && linkToGame) {
      linkToGame.href =
        'forest-treasure-hunt.html?lobby=' + encodeURIComponent(presetCode.trim().toUpperCase());
      linkToGame.classList.remove('hidden');
    }
    const stored = presetCode && sessionStorage.getItem('pasktipset_creator_' + presetCode.toUpperCase());
    if (stored) document.getElementById('token').value = stored;

    async function api(path, opts) {
      const r = await fetch(apiUrl(path), opts);
      const d = await window.pasktipsetParseJsonResponse(r);
      if (!r.ok) throw new Error(d.error || 'Fel');
      return d;
    }

    document.getElementById('btn-load').addEventListener('click', async () => {
      const err = document.getElementById('err');
      err.classList.add('hidden');
      const code = document.getElementById('code').value.trim().toUpperCase();
      const creatorToken = document.getElementById('token').value.trim();
      if (!code || !creatorToken) {
        err.textContent = 'Fyll i kod och nyckel.';
        err.classList.remove('hidden');
        return;
      }
      try {
        const d = await api('/api/lobbies/' + encodeURIComponent(code) + '/admin/players', {
          headers: { 'X-Creator-Token': creatorToken },
        });
        const ul = document.getElementById('list');
        ul.innerHTML = '';
        const states = d.playerStates || [];
        const subs = d.submissions || [];
        states.forEach((s) => {
          const li = document.createElement('li');
          li.className = 'border-b border-slate-100 py-2';
          li.innerHTML = `<span class="font-mono text-xs">${s.userId}</span> — sparad status
            <button type="button" class="ml-2 text-red-600 underline" data-uid="${s.userId}">nollställ</button>`;
          ul.appendChild(li);
        });
        subs.forEach((s) => {
          const li = document.createElement('li');
          li.className = 'border-b border-slate-100 py-2';
          const sid = s.submissionId || '';
          li.innerHTML = `<span class="font-mono text-xs">${s.userId || '—'}</span> — ${(s.name || '').replace(/</g, '')} (resultat)
            <button type="button" class="ml-2 text-red-600 underline" data-sub="${sid}">ta bort</button>`;
          ul.appendChild(li);
        });
        if (!states.length && !subs.length) {
          ul.innerHTML = '<li class="text-slate-500">Inga poster ännu.</li>';
        }
        ul.querySelectorAll('button[data-uid]').forEach((btn) => {
          btn.addEventListener('click', () => clearUser(code, creatorToken, btn.getAttribute('data-uid')));
        });
        ul.querySelectorAll('button[data-sub]').forEach((btn) => {
          const sid = btn.getAttribute('data-sub');
          if (sid)
            btn.addEventListener('click', () => clearSubmission(code, creatorToken, sid));
        });
        document.getElementById('panel').classList.remove('hidden');
        window.__code = code;
        window.__token = creatorToken;
      } catch (e) {
        err.textContent =
          e instanceof TypeError
            ? window.pasktipsetApiUnreachableMessage()
            : e.message || 'Fel';
        err.classList.remove('hidden');
      }
    });

    async function clearUser(code, creatorToken, userId) {
      if (!confirm('Nollställ denna spelare?')) return;
      await api('/api/lobbies/' + encodeURIComponent(code) + '/admin/clear', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ creatorToken, scope: 'user', userId }),
      });
      document.getElementById('btn-load').click();
    }

    async function clearSubmission(code, creatorToken, submissionId) {
      if (!confirm('Ta bort detta resultat?')) return;
      await api('/api/lobbies/' + encodeURIComponent(code) + '/admin/clear', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ creatorToken, scope: 'submission', submissionId }),
      });
      document.getElementById('btn-load').click();
    }

    document.getElementById('btn-clear-all').addEventListener('click', async () => {
      const code = window.__code;
      const creatorToken = window.__token;
      if (!code || !confirm('Radera ALLA spelares status och alla resultat för denna lobby?')) return;
      await api('/api/lobbies/' + encodeURIComponent(code) + '/admin/clear', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ creatorToken, scope: 'all' }),
      });
      document.getElementById('btn-load').click();
    });
  </script>
</body>
</html>
